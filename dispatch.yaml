- name: configuring dispatching
  hosts: dispatch
  become: yes
  tasks: 
   - name: installing go lo lanugage 
     ansible.builtin.dnf:
      name: golang
      state: present 

   - name: creating directory for system user 
     ansible.builtin.file: 
      path: /app
      state: directory

   - name: creating system user:
     ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      system: true
    
   - name: downloading the packages from url 
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/dispatch-v3.zip 
      dest: /tmp/dispatch.zip

   - name: unzipping package
     ansible.builtin.unarchieve:
      src: /tmp/dispatch.zip
      dest: /app
      remote_src: yes

   - name: installing dependencies for go 
     args:
      chdir: /app
     ansible.builtin.command: "{{ item }}"
     loop:
     - go mod init dispatch 
     - go get 
     - go build 

   - name: copying the dispatch service 
     ansible.builtin.command:
      src: dispatch.service'
      dest: /etc/systemd/system/dispatch.service

   - name: daemon reload
     ansible.builtin.system_service:
      daemon_reload: true 

   - name: staring and enabling dispatch 
     ansible.builtin.service:
      name: dispatch 
      state: started 
      enabled: yes 
    
      

   
