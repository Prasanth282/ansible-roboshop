- name: configuring mysql
  hosts: local 
  connection: local
  vars_files:
   - vars.yaml
  become: yes
  # vars_files:
  #  - vault/mysql.yaml
  tasks: 
   - name: installing my sql server 
     ansible.builtin.dnf:
      name: mysql-server
      state: present 

   - name: starting and enabling mysql service
     ansible.builtin.service:
      name: mysqld
      state: started 
      enabled: yes 

   - name: setup root password for my sql 
     ansible.builtin.command: mysql_secure_installation --set-root-pass {{ MYSQL_ROOT_PASSWORD }}
   