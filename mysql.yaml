- name: configuring my sql
  hosts: mysql
  become: yes
  vars_files:
   - vault/mysql.yaml
  tasks: 
   - name: installing my sql server 
     ansible.builtin.dnf:
      name: mysql-server
      state: present 

   - name: starting and enabling mysql
     ansible.builtin.service:
      name: mysql 
      state: started 
      enabled: yes 

   - name: setup root password for my sql 
     ansible.builtin.commed: mysql_secure_installation --set-root-pass RoboShop@1
   