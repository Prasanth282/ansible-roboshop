- name: configuring user
  hosts: user
  become: yes
  tasks:
   - name: disabling the nodejs 
     ansible.builtin.command:  dnf module disable nodejs

   - name: enabling nodejs:20 
     ansible.builtin.command:  dnf modue enable nodejs:20
   
   - name: installing nodejs 
     ansible.builtin.package: 
      name: nodejs
      state: present 

   - name: creating a directory for syatem user
     ansible.builtin.file:
      path: /app
      state: directory

   - name: creating system user to run application
     ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      system: true

   - name: downloading the devolement files from url 
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip

   - name: unzipping the file 
     ansible.builtin.unarchieve:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes

   - name: installing dependencies 
     community.genral.npm:
      path: /app

   - name: copying the user serrvice
     src: user.service
     dest: /etc/systemd/system/user.service

   - name: daemon reload for service
     ansible.builtin.systemd_service:
      daemon_reload: true

   - name: enabling and starting the user
     ansible.builtin.service:
      name: user
      state: started
      enabled: yes 

   - name: creating cart service
     ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/cart.service

   - name: system user reload u
     ansible.builtin.systemd_reload:
      daemon_reload: true 

   

   


       
     